model:
  name: "bmd1905/vietnamese-correction-v2"
  max_length: 256
  batch_size: 4

confidence:
  safe_threshold: 0.90
  review_threshold: 0.70
  aggressive_threshold: 0.50

engine:
  mode: "safe" # safe, review, aggressive
  track_changes: false
  highlight_fallback: true
  merge_mode: "soft-merge"
  
diff_engine:
  edit_ratio: 0.20
  length_delta_ratio: 0.30
  user_lexicon:
    - VietinBank
    - LPBank
    - InfinityFree
    - Google
    - Apple
    - Android
    - PayPal
    - OpenAI
    - Cần Thơ
    - Ninh Kiều

hybrid:
  use_hybrid: false
  confidence_threshold: 0.85
  user_lexicon:
    - VietinBank
    - LPBank
    - InfinityFree
    - Google
    - Apple
    - Android
    - PayPal
    - OpenAI
    - Cần Thơ
    - Ninh Kiều
